name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy. Leave empty to deploy the selected branch.'
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve commit SHA
        id: resolve
        run: |
          REF="${{ inputs.ref }}"
          if [ -z "$REF" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/$REF" \
              | jq -r '.sha')
            if [ "$SHA" = "null" ] || [ -z "$SHA" ]; then
              echo "::error::Failed to resolve ref '$REF' to a commit SHA"
              exit 1
            fi
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify image exists in GHCR
        run: |
          SHA="${{ steps.resolve.outputs.sha }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker manifest inspect "ghcr.io/${{ github.repository }}:sha-$SHA" > /dev/null
          echo "Verified: ghcr.io/${{ github.repository }}:sha-$SHA"

      - name: Deploy to production
        run: |
          SHA="${{ steps.resolve.outputs.sha }}"
          TAG="sha-$SHA"
          BODY=$(printf '${{ secrets.DEPLOY_TAG_PAYLOAD }}' "$TAG")

          curl -f -X PATCH "${{ secrets.DEPLOY_APP_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY"

          curl -f "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}"
